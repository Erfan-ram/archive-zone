name: khalifa
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - cuda-toolkit=12.6
  - cudnn
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu126
    - ftfy 
    - iopath
    - omegaconf
    - pandas 
    - regex 
    - scikit-learn
    - scikit-learn-intelex
    - submitit
    - termcolor
    - torch==2.12.0
    - torchvision
    - torchmetrics
    - transformers
    - accelerate
